<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="color-scheme" content="light" />

    <!-- Default title/description (overridden per-route by react-helmet-async) -->
    <title>Leichhardt Dental Centre — General & Implant Dentistry, Inner West Sydney</title>
    <meta
      name="description"
      content="General and implant dentistry in Leichhardt, led by Dr. Nick Kulkarni. Evidence-based care, calm approach, 20+ years of practice in Sydney's Inner West."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Leichhardt Dental Centre" />
    <meta property="og:title" content="Leichhardt Dental Centre — General & Implant Dentistry, Inner West Sydney" />
    <meta
      property="og:description"
      content="General and implant dentistry in Leichhardt, led by Dr. Nick Kulkarni. Evidence-based care, calm approach, 20+ years of practice."
    />
    <meta property="og:locale" content="en_AU" />
    <meta property="og:image" content="https://leichhardtdentist.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Leichhardt Dental Centre" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Leichhardt Dental Centre" />
    <meta
      name="twitter:description"
      content="General and implant dentistry in Leichhardt, led by Dr. Nick Kulkarni."
    />
    <meta name="twitter:image" content="https://leichhardtdentist.com/og-image.jpg" />

    <!-- Favicon / app icons (the old /src/assets/logo.svg reference 404'd in
         production builds and weighed 127 KB — the PNG set below covers all
         browsers) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Geo -->
    <meta name="geo.region" content="AU-NSW" />
    <meta name="geo.placename" content="Leichhardt, Sydney" />
    <meta name="geo.position" content="-33.8836;151.1574" />
    <meta name="ICBM" content="-33.8836, 151.1574" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
